<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com https://apis.google.com https://www.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://images.openfoodfacts.org https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.gstatic.com https://apis.google.com https://www.googleapis.com https://www.google.com https://firebaseappcheck.googleapis.com; frame-src https://*.firebaseapp.com https://apis.google.com https://accounts.google.com https://www.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self';">
  <title>Yomi — Análisis</title>
  <link rel="stylesheet" href="home.css?v=15">
  <link rel="stylesheet" href="styles.css?v=15">
  <style>
    .hidden{display:none!important}
    /* El upsell de free-plan usa el mismo tratamiento de card que account.html
       (.row-card + .icon-wrap, dentro del .content-card del panel) — ya no un
       bloque .history-locked-block standalone, que producía un "card dentro de
       card" visible dentro de este mismo .content-card. */
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <img src="assets/redesign/logo.svg" alt="Yomi" class="app-logo">
      <h1 class="page-title">Análisis</h1>
    </header>
    <main class="app-main content-page" id="history-root"></main>

    <!-- Bottom nav (hallazgo UX #7: sin esto no había forma de volver a Home) -->
    <nav class="bottom-nav">
      <button class="nav-item" aria-label="Inicio">
        <img src="assets/redesign/icon-home.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Inicio</span>
      </button>
      <button class="nav-item" id="nav-scan" aria-label="Escanear">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 4H8a4 4 0 0 0-4 4v1M9 20H8a4 4 0 0 1-4-4v-1M15 4h1a4 4 0 0 1 4 4v1M15 20h1a4 4 0 0 0 4-4v-1"/>
        </svg>
        <span class="nav-label nav-label-muted">Escanear</span>
      </button>
      <button class="nav-item active" id="nav-history" aria-label="Análisis">
        <img src="assets/redesign/icon-analysis.svg" alt="" class="nav-icon">
        <span class="nav-label">Análisis</span>
      </button>
      <button class="nav-item" id="nav-profile" aria-label="Perfil">
        <img src="assets/redesign/icon-profile.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Perfil</span>
      </button>
    </nav>
  </div>
  <script src="share.js?v=1"></script>
  <script src="app.js?v=74"></script>
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="authClient.js"></script>
  <script type="module" src="history-ui.js"></script>
  <script src="nav.js"></script>
</body>
</html>
