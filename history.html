<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://images.openfoodfacts.org https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.gstatic.com https://apis.google.com https://www.googleapis.com; frame-src https://*.firebaseapp.com https://apis.google.com https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self';">
  <title>Yomi — Análisis</title>
  <link rel="stylesheet" href="home.css?v=15">
  <link rel="stylesheet" href="styles.css?v=15">
  <style>
    .hidden{display:none!important}
    /* Card teaser simple, sin blur (hallazgo visual: un filter:blur en el
       padre no se puede "cancelar" con filter:none en el hijo — el CTA de
       adentro salía ilegible. No hay datos reales que ocultar aquí, solo un
       mensaje de upsell, así que una card plana normal es lo correcto). */
    .history-locked-block{padding:20px;border-radius:12px;background:var(--paper);border:1.5px solid var(--border);margin-top:12px;text-align:center}
    .history-locked-overlay{display:flex;flex-direction:column;align-items:center;gap:10px}
    #history-root{display:flex;flex-direction:column;gap:12px;padding:0 20px}
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header"><h1 class="page-title">Análisis</h1></header>
    <main class="app-main content-page" id="history-root"></main>
  </div>
  <script src="app.js?v=74"></script>
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="authClient.js"></script>
  <script type="module" src="history-ui.js"></script>
</body>
</html>
