<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://images.openfoodfacts.org https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.gstatic.com https://apis.google.com https://www.googleapis.com; frame-src https://*.firebaseapp.com https://apis.google.com https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self';">
  <title>Yomi — Mis preferencias</title>
  <link rel="stylesheet" href="home.css?v=15">
  <link rel="stylesheet" href="styles.css?v=15">
  <style>
    .hidden { display: none !important; }
    /* Jerarquía visual distinta al resto del form (hallazgo UX) — el
       consentimiento de datos de salud no debe pesar igual que un checkbox
       de dieta, o se skimea sin leerse. */
    .consent-block { display: block; border: 1px solid #c8ddd6; border-radius: 8px; padding: 14px; margin: 16px 0; background: #f4faf8; }
    .medical-disclaimer { font-size: 13px; color: #6b6b6b; margin: 8px 0 16px; }
    /* Select fuera del <label> del checkbox (hallazgo UX/accesibilidad): anidado
       adentro, tocar el select puede disparar el toggle del checkbox en algunos
       navegadores móviles. Tap targets con padding >= 44px. */
    .allergen-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; min-height: 44px; }
    fieldset { border: none; padding: 0; margin: 0 0 20px; }
    legend { font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; color: var(--ink); padding: 0; margin-bottom: 8px; }
    /* Re-agregado tras hallazgo de revisión (commit 52d57a1 lo quitó por
       completo): sigue aplicando a los <label> de Alergias (allergen-cacahuate,
       allergen-lacteos) y al <label> del consent-block, que NO se convirtieron
       a <button> en ese commit. Los tiles de dietary/healthConditions ahora son
       <button class="dietary-grid-item">, no <label>, así que esta regla no los
       afecta — es seguro re-agregarla verbatim. */
    #preferences-form label { display: block; font-size: 0.85rem; color: var(--ink-2); padding: 4px 0; }
    #preferences-form .btn { margin-top: 10px; }
    #dietary-tiles, #health-tiles { margin-bottom: 4px; }
    #btn-delete-preferences { margin: 4px 20px 0; width: calc(100% - 40px); }
    /* hallazgo UX #5: el 403 de free-plan en Guardar era invisible — sin
       estilos, #preferences-error/#consent-error solo eran texto plano que
       se perdía en la página. Tratamiento de error visible, consistente
       entre ambos. */
    #preferences-error, #consent-error {
      background: #fdecec;
      border: 1px solid #e79a9a;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 12px 0 0;
      color: #8a1f1f;
      font-size: 0.85rem;
    }
    #preferences-success {
      background: #eafaf3;
      border: 1px solid #9edcc1;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 12px 20px 0;
      color: #0d5c37;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header"><h1 class="page-title">Mis preferencias</h1></header>
    <main class="app-main content-page">
      <div class="content-card">
      <p class="medical-disclaimer">
        Este resultado es una guía informativa basada en tus preferencias y no
        sustituye el consejo de un profesional de la salud. Ante cualquier
        duda médica, consulta a tu médico.
      </p>
      <form id="preferences-form">
        <fieldset>
          <legend>Dietas</legend>
          <div class="dietary-icon-grid" id="dietary-tiles">
            <button type="button" class="dietary-grid-item" data-dietary="vegan" aria-pressed="false"><span class="emoji">🌱</span><span class="label">Vegano</span></button>
            <button type="button" class="dietary-grid-item" data-dietary="vegetarian" aria-pressed="false"><span class="emoji">🥦</span><span class="label">Vegetariano</span></button>
            <button type="button" class="dietary-grid-item" data-dietary="keto" aria-pressed="false"><span class="emoji">🥑</span><span class="label">Keto</span></button>
            <button type="button" class="dietary-grid-item" data-dietary="glutenFree" aria-pressed="false"><span class="emoji">🌾</span><span class="label">Sin gluten</span></button>
          </div>
        </fieldset>
        <fieldset>
          <legend>Alergias</legend>
          <div class="allergen-row">
            <input type="checkbox" id="allergen-cacahuate" name="allergen" value="cacahuate">
            <label for="allergen-cacahuate">Cacahuate</label>
            <select id="severity-cacahuate"><option value="mild">Aviso</option><option value="severe">Estricto</option></select>
          </div>
          <div class="allergen-row">
            <input type="checkbox" id="allergen-lacteos" name="allergen" value="lacteos">
            <label for="allergen-lacteos">Lácteos</label>
            <select id="severity-lacteos"><option value="mild">Aviso</option><option value="severe">Estricto</option></select>
          </div>
        </fieldset>
        <fieldset>
          <legend>Condiciones de salud</legend>
          <div class="dietary-icon-grid" id="health-tiles">
            <button type="button" class="dietary-grid-item" data-health="diabet" aria-pressed="false"><span class="emoji">🩸</span><span class="label">Diabetes</span></button>
            <button type="button" class="dietary-grid-item" data-health="celiac" aria-pressed="false"><span class="emoji">🌾</span><span class="label">Celiaquía</span></button>
            <button type="button" class="dietary-grid-item" data-health="hipert" aria-pressed="false"><span class="emoji">❤️</span><span class="label">Hipertensión</span></button>
            <button type="button" class="dietary-grid-item" data-health="ninos" aria-pressed="false"><span class="emoji">👶</span><span class="label">Niños en casa</span></button>
          </div>
        </fieldset>
        <div class="consent-block">
          <label>
            <input type="checkbox" id="consent-checkbox" required>
            Doy mi consentimiento expreso para que Yomi guarde y use estos datos de salud
            únicamente para personalizar mis resultados de escaneo, según el
            <a href="/privacidad.html" target="_blank" rel="noopener">Aviso de Privacidad</a>.
          </label>
          <p id="consent-error" class="hidden" role="alert"></p>
        </div>
        <button type="submit" id="btn-save-preferences" class="btn btn-primary">Guardar</button>
        <p id="preferences-error" class="hidden" role="alert"></p>
      </form>
      </div>
      <button id="btn-delete-preferences" class="btn btn-secondary">Borrar mis preferencias</button>
      <p id="preferences-success" class="hidden" role="status"></p>
    </main>

    <!-- Bottom nav (hallazgo UX #7: sin esto no había forma de volver a Home).
         Preferencias no es un destino primario del nav, así que ningún item
         se marca activo aquí. -->
    <nav class="bottom-nav">
      <button class="nav-item" aria-label="Inicio">
        <img src="assets/redesign/icon-home.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Inicio</span>
      </button>
      <button class="nav-item" id="nav-scan" aria-label="Escanear">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 4H8a4 4 0 0 0-4 4v1M9 20H8a4 4 0 0 1-4-4v-1M15 4h1a4 4 0 0 1 4 4v1M15 20h1a4 4 0 0 0 4-4v-1"/>
        </svg>
        <span class="nav-label nav-label-muted">Escanear</span>
      </button>
      <button class="nav-item" id="nav-history" aria-label="Análisis">
        <img src="assets/redesign/icon-analysis.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Análisis</span>
      </button>
      <button class="nav-item" id="nav-profile" aria-label="Perfil">
        <img src="assets/redesign/icon-profile.svg" alt="" class="nav-icon">
        <span class="nav-label nav-label-muted">Perfil</span>
      </button>
    </nav>
  </div>
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="authClient.js"></script>
  <script type="module" src="preferences-ui.js"></script>
  <script src="nav.js"></script>
</body>
</html>
